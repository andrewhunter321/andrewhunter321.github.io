<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Star Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #backgroundCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1; /* Ensure the canvas stays behind the content */
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="backgroundCanvas"></canvas> <!-- Same as other pages -->

    <h1>Star Control</h1>

    <label for="starCount">Number of Stars</label>
    <input type="number" id="starCount" value="150" max="19999">

    <label for="starSpeed">Star Speed</label>
    <input type="range" id="starSpeed" min="0.1" max="2" step="0.1" value="0.5">

    <label for="starVisibility">Show Stars</label>
    <input type="checkbox" id="starVisibility" checked>

    <button id="applySettings">Apply Settings</button>

    <script src="../scripts/script.js"></script> <!-- Include the script for stars -->
    <script>
        document.getElementById("applySettings").addEventListener("click", function() {
            let starCount = parseInt(document.getElementById("starCount").value);
            const starSpeed = parseFloat(document.getElementById("starSpeed").value);
            const starVisibility = document.getElementById("starVisibility").checked;

            // Ensure star count does not exceed 19999
            if (starCount > 19999) {
                starCount = 19999;
                document.getElementById("starCount").value = 19999; // Reset input value to 19999
                alert("Star count cannot exceed 19,999. It has been set to the maximum limit.");
            }

            // Dispatch the settings to the script.js
            const settings = new CustomEvent('updateStarSettings', {
                detail: { starCount, starSpeed, starVisibility }
            });
            document.dispatchEvent(settings);
        });
    </script>
</body>
</html>
